apis:
- aid: svn:svn-webdav-http-api
  name: SVN WebDAV HTTP API
  description: Apache Subversion exposes repository operations over HTTP/HTTPS using the WebDAV/DeltaV protocol via the mod_dav_svn
    Apache module. Clients use OPTIONS, PROPFIND, GET, PUT, REPORT, MKACTIVITY, CHECKOUT, MERGE, COPY, DELETE, and PROPPATCH
    to perform version control operations including checkout, commit, update, log retrieval, and branching.
  humanURL: https://subversion.apache.org/docs/
  baseURL: https://svn.example.com/repos/
