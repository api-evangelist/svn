naftiko: "1.0.0-alpha1"

info:
  label: "SVN WebDAV HTTP API"
  description: >-
    Apache Subversion repository access via the WebDAV/DeltaV protocol. Enables
    version control operations including file retrieval, commit transactions,
    historical revision access, and repository metadata via HTTP/HTTPS.
  tags:
    - Apache
    - Repository
    - Source Control
    - Subversion
    - Version Control
    - Webdav
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SVN_USERNAME: SVN_USERNAME
      SVN_PASSWORD: SVN_PASSWORD

capability:
  consumes:
    - type: http
      namespace: svn-webdav
      baseUri: https://svn.example.com/repos/{repository}
      description: "Apache Subversion WebDAV/DeltaV HTTP repository interface"
      authentication:
        type: basic
        username: "{{SVN_USERNAME}}"
        password: "{{SVN_PASSWORD}}"
      resources:
        - name: repository
          path: /
          description: "Repository root and metadata"
          operations:
            - name: get-repository-root
              method: GET
              description: "Retrieve the repository root listing"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: files
          path: /{path}
          description: "File and directory content"
          operations:
            - name: get-file-or-directory
              method: GET
              description: "Retrieve file content or directory listing"
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path within the repository"
                - name: p
                  in: query
                  type: integer
                  required: false
                  description: "Peg revision number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: put-file
              method: PUT
              description: "Upload file content as part of an active commit transaction"
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path to write"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: octet-stream
                data:
                  content: "{{tools.content}}"

            - name: delete-file-or-directory
              method: DELETE
              description: "Delete a file or directory within an active commit transaction"
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path to delete"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: transactions
          path: /$svn/act/
          description: "Commit transaction management"
          operations:
            - name: create-commit-transaction
              method: POST
              description: "Create a new commit transaction (MKACTIVITY)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: versioned-resources
          path: /!svn/rvr/{revision}/{path}
          description: "Historical versioned resource access"
          operations:
            - name: get-revision-versioned-resource
              method: GET
              description: "Get file content at a specific historical revision"
              inputParameters:
                - name: revision
                  in: path
                  type: integer
                  required: true
                  description: "Revision number"
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Repository path"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: svn-webdav-rest
      resources:
        - path: /v1/repository
          name: repository
          description: "Repository root information"
          operations:
            - method: GET
              name: get-repository-root
              description: "Get repository root listing"
              call: "svn-webdav.get-repository-root"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/files/{path}
          name: files
          description: "File and directory operations"
          operations:
            - method: GET
              name: get-file-or-directory
              description: "Get file or directory content"
              call: "svn-webdav.get-file-or-directory"
              with:
                path: "rest.path"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: put-file
              description: "Upload file content to transaction"
              call: "svn-webdav.put-file"
              with:
                path: "rest.path"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-file-or-directory
              description: "Delete file or directory in transaction"
              call: "svn-webdav.delete-file-or-directory"
              with:
                path: "rest.path"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/transactions
          name: transactions
          description: "Commit transaction lifecycle"
          operations:
            - method: POST
              name: create-commit-transaction
              description: "Start a new commit transaction"
              call: "svn-webdav.create-commit-transaction"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/revisions/{revision}/files/{path}
          name: versioned-resources
          description: "Historical file access by revision"
          operations:
            - method: GET
              name: get-revision-versioned-resource
              description: "Get file at specific revision"
              call: "svn-webdav.get-revision-versioned-resource"
              with:
                revision: "rest.revision"
                path: "rest.path"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: svn-webdav-mcp
      transport: http
      tools:
        - name: get-repository-root
          description: "Retrieve the SVN repository root listing"
          hints:
            readOnly: true
            idempotent: true
          call: "svn-webdav.get-repository-root"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-file-or-directory
          description: "Get SVN file content or directory listing"
          hints:
            readOnly: true
            idempotent: true
          call: "svn-webdav.get-file-or-directory"
          with:
            path: "tools.path"
          outputParameters:
            - type: object
              mapping: "$."

        - name: put-file
          description: "Upload file content to active SVN commit transaction"
          hints:
            readOnly: false
            idempotent: false
          call: "svn-webdav.put-file"
          with:
            path: "tools.path"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-file-or-directory
          description: "Delete file or directory within SVN commit transaction"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "svn-webdav.delete-file-or-directory"
          with:
            path: "tools.path"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-commit-transaction
          description: "Create a new SVN commit transaction (MKACTIVITY)"
          hints:
            readOnly: false
            idempotent: false
          call: "svn-webdav.create-commit-transaction"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-revision-versioned-resource
          description: "Retrieve SVN file content at a specific historical revision"
          hints:
            readOnly: true
            idempotent: true
          call: "svn-webdav.get-revision-versioned-resource"
          with:
            revision: "tools.revision"
            path: "tools.path"
          outputParameters:
            - type: object
              mapping: "$."
